    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Firebase Compat SDKs — funcionam em file://, http:// e https:// -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script>
        (function() {
            // Firebase não funciona via file:// — aguarda disparo do evento mesmo assim
            if (typeof firebase === 'undefined') {
                window._fbReady = false;
                window.dispatchEvent(new Event('firebase-ready'));
                return;
            }
            const firebaseConfig = {
                apiKey:            "AIzaSyAu3iSqBGQXHP3Z0oH-axlMf7G2PoWpKxE",
                authDomain:        "laura-portfolio-cc181.firebaseapp.com",
                projectId:         "laura-portfolio-cc181",
                storageBucket:     "laura-portfolio-cc181.firebasestorage.app",
                messagingSenderId: "839867448142",
                appId:             "1:839867448142:web:3bd614672fe4bf53617c1f"
            };

            try {
                const fbApp   = firebase.initializeApp(firebaseConfig);
                const db      = firebase.firestore();
                const storage = firebase.storage();
                const DOC_ID  = 'main';

                window._fb = {
                    async saveData(cleanData) {
                        // recebe dados já processados por _stripHeavyData no escopo global
                        await db.collection('portfolio').doc(DOC_ID).set(cleanData);
                    },

                    async loadData() {
                        const snap = await db.collection('portfolio').doc(DOC_ID).get();
                        return snap.exists ? snap.data() : null;
                    },

                    async uploadVideo(file, index) {
                        const path = 'reels/reel_' + index + '_' + Date.now() + '.mp4';
                        const storageRef = storage.ref(path);
                        await storageRef.put(file);
                        const url = await storageRef.getDownloadURL();
                        return { url: url, path: path };
                    },

                    async deleteVideo(path) {
                        if (!path) return;
                        try { await storage.ref(path).delete(); } catch(e) {}
                    },

                    // Upload de imagem para Storage — retorna URL permanente
                    async uploadImage(blob, folder, name) {
                        const path = folder + '/' + name + '_' + Date.now() + '.jpg';
                        const storageRef = storage.ref(path);
                        await storageRef.put(blob, { contentType: 'image/jpeg' });
                        const url = await storageRef.getDownloadURL();
                        return { url: url, path: path };
                    },

                    async deleteImage(path) {
                        if (!path) return;
                        try { await storage.ref(path).delete(); } catch(e) {}
                    }
                };

                // Autenticação anônima — necessária para regras Firestore/Storage com auth != null
                const auth = firebase.auth();
                auth.signInAnonymously().catch(e => console.warn('Auth anônima falhou:', e.message));

                window._fbReady = true;
                window.dispatchEvent(new Event('firebase-ready'));
                console.log('Firebase inicializado com sucesso.');
            } catch(err) {
                console.warn('Firebase indisponível (file:// ou offline):', err.message);
                window._fbReady = false;
                window.dispatchEvent(new Event('firebase-ready'));
            }
        })();
    </script>
    <style>

            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;

            background: rgba(201, 168, 76, 0.03);
            border: 1px solid var(--border-gold);

        /* ══ POLAROID GRID ══ */
        .polaroid-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.8rem;
            margin-top: 2.5rem;
        }

        .polaroid {
            background: #fff;
            padding: 0.75rem 0.75rem 2.5rem;
            box-shadow: 0 4px 20px rgba(44,32,20,0.15), 0 1px 4px rgba(44,32,20,0.1);
            transform: rotate(var(--rot, -2deg));
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            cursor: default;
            position: relative;
        }

        .polaroid:nth-child(2n) { --rot: 1.5deg; }
        .polaroid:nth-child(3n) { --rot: -3deg; }
        .polaroid:nth-child(4n) { --rot: 2.5deg; }

        .polaroid:hover {
            transform: rotate(0deg) scale(1.07);
            box-shadow: 0 12px 40px rgba(44,32,20,0.22);
            z-index: 10;
        }

        .polaroid-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            background: var(--bg1);
        }

            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--bg1), var(--cream));
            display: flex;
            align-items: center;
            justify-content: center;

            width: 40px;
            height: 2px;
            background: var(--grad);
            border-radius: 2px;
            margin: 0 auto 1.5rem;
        }

        .phone-links {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            width: 100%;
        }

        .phone-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            background: var(--bg1);
            border-radius: 12px;
            text-decoration: none;
            color: var(--t1);
            font-size: 0.78rem;
            font-weight: 500;
            transition: all 0.25s ease;
            border: 1px solid var(--border);
        }

        .phone-link:hover {
            background: var(--gold);
            color: #fff;
            border-color: var(--gold);
            transform: scale(1.02);
        }

        .phone-link i {
            width: 16px;
            font-size: 1rem;
        }

        .phone-social {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.2rem;
            justify-content: center;
        }

        .phone-social-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            color: #fff;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        .phone-social-btn:hover { transform: scale(1.15); color: #fff; }
        .phone-social-btn.ig { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .phone-social-btn.tt { background: #000; }
        .phone-social-btn.li { background: #0077b5; }
        .phone-social-btn.yt { background: #ff0000; }
        .phone-social-btn.wa { background: #25d366; }

        .phone-home-bar {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phone-home-bar::after {
            content: '';
            width: 100px; height: 4px;
            background: var(--t2);
            border-radius: 2px;
            opacity: 0.3;
        }

        /* ══ HERO STORYTELLING ══ */
        .hero-editorial-tag {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1rem;
            color: var(--rose);
            margin-bottom: 0.5rem;
            display: block;
        }

        .hero-floating-badge {
            position: absolute;
            padding: 0.6rem 1.2rem;
            background: #fff;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--t1);
            box-shadow: 0 4px 20px rgba(200,113,122,0.2);
            white-space: nowrap;
            animation: floatBadge 3s ease-in-out infinite;
            border: 1px solid rgba(200,113,122,0.15);
            z-index: 5;
        }

        .hero-floating-badge.badge-1 {
            top: 10%; right: -8%;
            animation-delay: 0s;
        }

        .hero-floating-badge.badge-2 {
            bottom: 15%; right: -6%;
            animation-delay: 1.5s;
        }

        @media (max-width: 900px) {
            .hero-floating-badge { display: none; }
        }

        @keyframes floatBadge {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* ══ ICON NAV (mobile-style) ══ */
        .icon-nav-strip {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 2rem 0 0;
        }

        .icon-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            padding: 0.8rem 1rem;
            background: #fff;
            border-radius: 14px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            color: var(--t1);
            min-width: 70px;
        }

        .icon-nav-item:hover {
            background: var(--gold);
            border-color: var(--gold);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(201,149,108,0.3);
        }

        .icon-nav-item i {
            font-size: 1.3rem;
        }

        .icon-nav-item span {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* ══════════════════════════════════════════════════════
           SEÇÃO REELS — Mockup iPhone Carrossel 3D
        ══════════════════════════════════════════════════════ */
        #reels-section {
            padding: 6rem 2rem;
            background: var(--bg0);
            overflow: hidden;
            position: relative;
        }

        #reels-section::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .reels-heading {
            text-align: center;
            margin-bottom: 4rem;
        }

        .reels-heading h2 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            background: linear-gradient(135deg, #2A1520 40%, #C8717A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .reels-heading p {
            font-size: 0.95rem;
            color: var(--t2);
        }

        .reels-heading .ig-handle {
            font-size: 0.8rem;
            color: var(--gold);
            margin-top: 0.3rem;
        }

        /* Carrossel wrapper */
        .reels-carousel-wrap {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            height: 620px;
            perspective: 1200px;
        }

        .reels-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Cada slide/celular */
        .reel-slide {
            position: absolute;
            width: 240px;
            transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            user-select: none;
        }

        /* Estado central */
        .reel-slide.pos-center {
            transform: translateX(0) scale(1) rotateY(0deg);
            z-index: 10;
            filter: none;
        }

        /* Estado esquerda */
        .reel-slide.pos-left {
            transform: translateX(-260px) scale(0.78) rotateY(18deg);
            z-index: 5;
            filter: brightness(0.55) blur(1px);
        }

        /* Estado direita */
        .reel-slide.pos-right {
            transform: translateX(260px) scale(0.78) rotateY(-18deg);
            z-index: 5;
            filter: brightness(0.55) blur(1px);
        }

        /* Escondido (fora de vista) */
        .reel-slide.pos-hidden-left {
            transform: translateX(-480px) scale(0.55) rotateY(30deg);
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        .reel-slide.pos-hidden-right {
            transform: translateX(480px) scale(0.55) rotateY(-30deg);
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        /* Frame do iPhone */
        .iphone-frame {
            position: relative;
            width: 240px;
            height: 520px;
            background: linear-gradient(160deg, #2a2a2a 0%, #111 40%, #1a1a1a 100%);
            border-radius: 44px;
            box-shadow:
                0 0 0 2px #3a3a3a,
                0 0 0 4px #222,
                0 25px 60px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.08);
            overflow: hidden;
            padding: 14px;
        }

        /* Reflexo lateral do iPhone */
        .iphone-frame::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0.04), transparent);
            border-radius: 44px 0 0 44px;
            pointer-events: none;
            z-index: 20;
        }

        /* Dynamic Island */
        .dynamic-island {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 24px;
            background: #000;
            border-radius: 20px;
            z-index: 25;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
        }

        /* Tela do iPhone */
        .iphone-screen {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 33px;
            overflow: hidden;
            position: relative;
        }

        /* Vídeo dentro da tela */
        .iphone-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Placeholder quando sem vídeo */
        .reel-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            background: linear-gradient(160deg, #1a0d20, #0d0a18);
        }

        .reel-placeholder i {
            font-size: 2.5rem;
            color: #c13584;
            opacity: 0.7;
        }

        .reel-placeholder span {
            font-size: 0.7rem;
            color: var(--t2);
            text-align: center;
            padding: 0 1rem;
            line-height: 1.4;
        }

        /* Overlay de info na tela (caption/categoria) */
        .iphone-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 1.5rem 1rem 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .reel-slide.pos-center .iphone-overlay {
            opacity: 1;
        }

        .iphone-overlay .reel-cat {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.2rem;
        }

        .iphone-overlay .reel-cap {
            font-size: 0.75rem;
            color: #fff;
            font-weight: 500;
            line-height: 1.3;
        }

        /* Ícone de play no centro do iPhone */
        .iphone-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 52px;
            height: 52px;
            background: rgba(0,0,0,0.55);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            z-index: 16;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.35);
            backdrop-filter: blur(4px);
        }

        .reel-slide.pos-center.is-playing .iphone-play-btn {
            opacity: 0;
        }

        .reel-slide.pos-center:active .iphone-play-btn {
            transform: translate(-50%, -50%) scale(0.88);
        }

        /* Botões prev/next */
        .reels-nav {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 2rem;
        }

        .reels-nav-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-gold);
            background: rgba(201,168,76,0.06);
            color: var(--gold);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .reels-nav-btn:hover {
            background: rgba(201,168,76,0.15);
            border-color: var(--gold);
            transform: scale(1.08);
        }

        /* Dots de paginação */
        .reels-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.2rem;
        }

        .reels-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(201,168,76,0.25);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .reels-dot.active {
            background: var(--gold);
            width: 20px;
            border-radius: 3px;
        }

        /* Barra de progresso do vídeo */
        .iphone-progress {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: rgba(255,255,255,0.2);
            z-index: 20;
        }

        .iphone-progress-bar {
            height: 100%;
            background: var(--gold);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Responsivo mobile */
        @media (max-width: 600px) {
            .reels-carousel-wrap { height: 520px; }
            .reel-slide { width: 200px; }
            .iphone-frame { width: 200px; height: 434px; }
            .reel-slide.pos-left { transform: translateX(-190px) scale(0.72) rotateY(18deg); }
            .reel-slide.pos-right { transform: translateX(190px) scale(0.72) rotateY(-18deg); }
        }

        @media (max-width: 768px) {
            nav {
                padding: 0 1rem;
            }

            .nav-links {
                display: none;
            }

            .nav-toggle {
                display: block;
            }

            .nav-toggle.open ~ .nav-links {
                display: flex;
                position: absolute;
                top: 70px;
                left: 0;
                right: 0;
                flex-direction: column;
                background: rgba(253, 248, 245, 0.98);
                border-bottom: 1px solid var(--border);
                padding: 1rem;
                gap: 1rem;
            }

            .hero-inner {
                grid-template-columns: 1fr;
                padding-top: 100px;
                padding-bottom: 60px;
                gap: 2.5rem;
                text-align: center;
            }

            .hero-ctas { justify-content: center; }
            .hero-badges { justify-content: center; }
            .hero-bio { margin: 0 auto 2rem; }
            .hero-image { max-width: 320px; margin: 0 auto; }

            .about-grid {
                grid-template-columns: 1fr;
            }

            .highlights {
                grid-template-columns: 1fr;
            }

            #adm-sidebar {
                width: 180px;
                font-size: 0.7rem;
            }

            .adm-tab {
                padding: 0.6rem 0.8rem;
                font-size: 0.7rem;
            }

            #adm-content {
                padding: 1rem 1.5rem;
            }

            /* ── SEÇÕES: padding menor no mobile ── */
            section { padding: 3rem 1.2rem; }

            .section-heading { margin-bottom: 2rem; }

            /* ── SERVIÇOS ── */
            .services-grid { grid-template-columns: 1fr; gap: 1rem; }
            .service-card  { padding: 1.4rem; }
            .service-title { font-size: 1rem; }
            .service-desc  { font-size: 0.82rem; }

            /* ── PROCESSO ── */
            .process-steps { grid-template-columns: 1fr 1fr; gap: 1rem; }
            .step           { padding: 1.3rem 1rem; }
            .step-number    { font-size: 2rem; }
            .step-title     { font-size: 0.9rem; }
            .step-desc      { font-size: 0.78rem; }

            /* ── FERRAMENTAS ── */
            .tools-grid    { grid-template-columns: 1fr; gap: 1rem; }
            .tool-category { padding: 1.4rem; }
            .tool-name     { font-size: 0.9rem; }
            .tool-items    { font-size: 0.78rem; }
            .tool-pill     { font-size: 0.7rem; padding: 0.25rem 0.6rem; }

            /* ── MINHA BOLSA ── */
            .bag-grid  { grid-template-columns: 1fr 1fr; gap: 0.9rem; margin-top: 1.5rem; }
            .bag-item  { padding: 1.4rem 1rem; border-radius: 12px; }
            .bag-emoji { font-size: 2rem; margin-bottom: 0.7rem; }
            .bag-skill { font-size: 0.88rem; }
            .bag-desc  { font-size: 0.76rem; line-height: 1.5; }

            /* ── FORMAÇÃO ── */
            .timeline-title       { font-size: 0.9rem; }
            .timeline-institution { font-size: 0.8rem; }
            .timeline-year        { font-size: 0.75rem; }
            .timeline-desc        { font-size: 0.76rem; line-height: 1.5; }

            /* ── MÉTRICAS ── */
            .metrics-grid  { grid-template-columns: 1fr 1fr; gap: 1rem; }
            .metric-card   { padding: 1.4rem 1rem; }
            .metric-value  { font-size: 1.8rem; }
            .metric-label  { font-size: 0.72rem; }

            /* ── PARCERIAS ── */
            .partners-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
            .partner-name  { font-size: 0.9rem; }

            /* ── DEPOIMENTOS ── */
            .testimonials-grid { grid-template-columns: 1fr; gap: 1rem; }
            .testimonial-text  { font-size: 0.84rem; }

            /* ── POLAROIDS ── */
            .polaroid-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
            .polaroid-caption { font-size: 0.68rem; }

            /* ── DESTAQUES SOBRE ── */
            .highlight-card  { padding: 1.2rem; }
            .highlight-icon  { font-size: 1.5rem; }
            .highlight-title { font-size: 0.9rem; }
            .highlight-text  { font-size: 0.78rem; }

            /* ── CONTATO ── */
            #contato-phone { padding: 2rem 1rem; min-height: unset; }
            .phone-device  { width: 290px; }

            /* ── BOTÕES ── */
            .cta-btn { padding: 0.65rem 1.3rem; font-size: 0.82rem; }
        }

        /* ── TELAS MUITO PEQUENAS (≤ 420px) ── */
        @media (max-width: 420px) {
            section { padding: 2.5rem 1rem; }

            .hero-inner { padding-top: 90px; padding-bottom: 50px; }

            .bag-grid      { grid-template-columns: 1fr; }
            .process-steps { grid-template-columns: 1fr; }
            .partners-grid { grid-template-columns: 1fr; }
            .metrics-grid  { grid-template-columns: 1fr 1fr; }

            .phone-device { width: 260px; border-radius: 38px; }

            .nav-logo { font-size: 1.1rem; }
            .section-heading h2 { font-size: 1.6rem; }
        }
    
        /* ══ FORÇAR TEMA CLARO EM TODAS AS SEÇÕES DO SITE ══ */
        /* Garante que mesmo com cores salvas antigas, o site fica claro */
        body, section, #root, #root > * {
            --force-light: 1;
        }

        section:not(#adm-panel) {
            background-color: var(--bg0);
        }

        section.alt {
            background-color: var(--bg1) !important;
        }

        #hero {
            background: linear-gradient(160deg, #FDF8F5 0%, #F5EBE8 60%, #FDF0EC 100%) !important;
        }

        #sobre { background-color: var(--bg1) !important; }
        #servicos { background-color: var(--bg0) !important; }
        #processo { background-color: var(--bg1) !important; }
        #ferramentas { background-color: var(--bg0) !important; }
        #portfolio { background-color: var(--bg1) !important; }
        #reels-section { background-color: var(--bg0) !important; }
        #bag-section { background-color: #FDF0EC !important; }
        #formacao { background-color: var(--bg0) !important; }
        #metricas { background-color: var(--bg1) !important; }
        #parcerias { background-color: var(--bg0) !important; }
        #depoimentos { background-color: var(--bg1) !important; }
        #contato { background-color: var(--bg0) !important; }
        #contato-phone { background-color: var(--bg1) !important; }

        /* Textos sempre escuros e legíveis */
        section:not(#adm-panel) h1,
        section:not(#adm-panel) h2,
        section:not(#adm-panel) h3,
        section:not(#adm-panel) h4 {
            color: var(--t1);
        }

        section:not(#adm-panel) p,
        section:not(#adm-panel) .about-text,
        section:not(#adm-panel) .step-desc,
        section:not(#adm-panel) .service-desc,
        section:not(#adm-panel) .bag-desc {
            color: var(--t2);
        }

        /* Service cards fundo branco explícito */
        .service-card, .step, .tool-category, .highlight-card, .bag-item {
            background: #fff !important;
            border-color: rgba(200,113,122,0.18) !important;
        }

        /* Textos dos cards legíveis */
        .service-title, .step-title, .tool-name, .highlight-title, .bag-skill {
            color: var(--t1) !important;
        }

        .service-desc, .step-desc, .tool-items, .highlight-text, .bag-desc {
            color: var(--t2) !important;
        }

        .service-icon, .step-icon, .tool-icon, .highlight-icon, .metric-icon {
            color: var(--gold) !important;
        }

        .step-number {
            color: var(--accent) !important;
        }

        /* Section heading legível */
        .section-heading p {
            color: var(--t2) !important;
        }

        /* ===== EXPORT PDF / PRINT ===== */
        @media print {

            /* ══ PÁGINA ══ */
            @page           { size: A4 portrait; margin: 0; }
            @page :first    { margin: 0; }
            @page :not(:first) { margin: 14mm 15mm 16mm 15mm; }

            /* ══ RESET GLOBAL ══ */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }
            html, body {
                width: 210mm !important;
                height: auto !important;
                overflow: visible !important;
                background: #FAF7F4 !important;
                font-size: 9.5pt !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            /* Congela animações — evita opacity:0 no print */
            *, *::before, *::after {
                animation: none !important;
                transition: none !important;
                opacity: 1 !important;
                transform: none !important;
                box-shadow: none !important;
                text-shadow: none !important;
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
            }

            /* ══ OCULTAR UI ══ */
            #adm-fab, #adm-login, #adm-panel,
            .notification, nav, .nav-toggle,
            #reels-section, video, .reels-nav-btn,
            .phone-wrap, #contato-phone, footer,
            #hero { display: none !important; }

            a::after { content: none !important; }

            /* ══════════════════════════════════════════
               CAPA  #pdf-cover  (gerada pelo JS)
               ══════════════════════════════════════════ */
            #pdf-cover {
                display: block !important;
                width: 210mm !important;
                height: 297mm !important;
                overflow: hidden !important;
                position: relative !important;
                background: #FAF7F4 !important;
                page-break-after: always !important;
                break-after: page !important;
                box-sizing: border-box !important;
                font-family: 'Montserrat', sans-serif !important;
            }

            /* Faixa escura superior — vinho degradê */
            .pdf-cover-top {
                position: absolute !important;
                top: 0 !important; left: 0 !important; right: 0 !important;
                height: 128mm !important;
                background: linear-gradient(140deg, #3D1A26 0%, #7B2D45 55%, #A84C65 100%) !important;
                overflow: hidden !important;
            }
            .pdf-cover-top::before {
                content: '' !important;
                position: absolute !important;
                top: -30mm !important; right: -30mm !important;
                width: 100mm !important; height: 100mm !important;
                border-radius: 50% !important;
                background: rgba(255,255,255,0.05) !important;
            }
            .pdf-cover-top::after {
                content: '' !important;
                position: absolute !important;
                bottom: -18mm !important; left: -18mm !important;
                width: 65mm !important; height: 65mm !important;
                border-radius: 50% !important;
                background: rgba(255,255,255,0.04) !important;
            }

            /* Conteúdo da faixa — texto + foto */
            .pdf-cover-hero {
                position: absolute !important;
                top: 0 !important; left: 0 !important; right: 0 !important;
                height: 128mm !important;
                display: flex !important;
                flex-direction: row !important;
                align-items: center !important;
                padding: 0 14mm !important;
                gap: 10mm !important;
                z-index: 2 !important;
                box-sizing: border-box !important;
            }
            .pdf-cover-text { flex: 1 !important; }

            /* Rótulo editorial em itálico */
            .pdf-cover-tag {
                display: block !important;
                font-size: 7pt !important;
                color: rgba(255,255,255,0.6) !important;
                font-style: italic !important;
                margin-bottom: 3mm !important;
                font-family: 'Cormorant Garamond', Georgia, serif !important;
            }
            /* Pílula PORTFÓLIO PROFISSIONAL */
            .pdf-cover-pill {
                display: inline-block !important;
                background: rgba(255,255,255,0.14) !important;
                border: 1px solid rgba(255,255,255,0.28) !important;
                color: #fff !important;
                font-size: 6pt !important;
                padding: 1.5mm 5mm !important;
                border-radius: 50px !important;
                margin-bottom: 5mm !important;
                font-weight: 700 !important;
                letter-spacing: 0.14em !important;
                text-transform: uppercase !important;
            }
            /* Nome */
            .pdf-cover-name {
                font-family: 'Playfair Display', Georgia, serif !important;
                font-size: 27pt !important;
                font-weight: 700 !important;
                color: #fff !important;
                line-height: 1.05 !important;
                margin-bottom: 3mm !important;
            }
            .pdf-cover-name span {
                color: rgba(255,255,255,0.72) !important;
                font-style: italic !important;
                display: block !important;
            }
            .pdf-cover-subtitle {
                font-size: 9pt !important;
                color: rgba(255,255,255,0.88) !important;
                font-weight: 600 !important;
                letter-spacing: 0.04em !important;
                margin-bottom: 2.5mm !important;
            }
            .pdf-cover-bio {
                font-size: 7.5pt !important;
                color: rgba(255,255,255,0.72) !important;
                line-height: 1.6 !important;
                max-width: 95mm !important;
            }
            /* Foto */
            .pdf-cover-photo {
                width: 52mm !important;
                height: 76mm !important;
                border-radius: 10px 10px 0 0 !important;
                overflow: hidden !important;
                border: 2px solid rgba(255,255,255,0.2) !important;
                background: rgba(255,255,255,0.08) !important;
                flex-shrink: 0 !important;
                align-self: flex-end !important;
            }
            .pdf-cover-photo img {
                width: 100% !important;
                height: 100% !important;
                object-fit: cover !important;
                object-position: top center !important;
            }
            .pdf-cover-photo-placeholder {
                width: 100% !important; height: 100% !important;
                display: flex !important; align-items: center !important; justify-content: center !important;
                flex-direction: column !important; gap: 2mm !important;
                color: rgba(255,255,255,0.38) !important; font-size: 7.5pt !important;
                text-align: center !important;
            }

            /* Área clara da capa */
            .pdf-cover-bottom {
                position: absolute !important;
                top: 131mm !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
                padding: 9mm 14mm 9mm 14mm !important;
                box-sizing: border-box !important;
                display: flex !important;
                flex-direction: column !important;
                background: #FAF7F4 !important;
            }
            .pdf-cover-section-title {
                font-family: 'Playfair Display', Georgia, serif !important;
                font-size: 12pt !important;
                font-weight: 700 !important;
                color: #2C1A20 !important;
                margin-bottom: 5mm !important;
                padding-bottom: 2.5mm !important;
                border-bottom: 1.5px solid rgba(123,45,69,0.2) !important;
            }
            /* Grid de serviços — 2 colunas */
            .pdf-cover-services {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 3.5mm !important;
                flex: 1 !important;
            }
            .pdf-cover-service-card {
                background: rgba(123,45,69,0.04) !important;
                border: 1px solid rgba(123,45,69,0.14) !important;
                border-radius: 7px !important;
                padding: 4mm 4.5mm !important;
                display: flex !important;
                flex-direction: row !important;
                align-items: flex-start !important;
                gap: 3mm !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }
            .pdf-cover-service-icon {
                font-size: 11pt !important;
                color: #7B2D45 !important;
                flex-shrink: 0 !important;
                margin-top: 0.5mm !important;
            }
            .pdf-cover-service-title {
                font-size: 8.5pt !important;
                font-weight: 700 !important;
                color: #2C1A20 !important;
                font-family: 'Playfair Display', Georgia, serif !important;
                line-height: 1.2 !important;
            }
            .pdf-cover-service-desc {
                font-size: 6pt !important;
                color: #8A7070 !important;
                line-height: 1.4 !important;
                margin-top: 1mm !important;
            }
            .pdf-cover-service-tags {
                display: flex !important;
                flex-wrap: wrap !important;
                gap: 1mm !important;
                margin-top: 1.5mm !important;
            }
            .pdf-cover-service-tags span {
                font-size: 5.5pt !important;
                color: #7B2D45 !important;
                background: rgba(123,45,69,0.09) !important;
                border-radius: 50px !important;
                padding: 0.4mm 2mm !important;
                font-weight: 600 !important;
            }
            /* Métricas na capa */
            .pdf-cover-metrics {
                display: flex !important;
                gap: 0 !important;
                margin-bottom: 4.5mm !important;
                border-radius: 8px !important;
                overflow: hidden !important;
                border: 1px solid rgba(123,45,69,0.16) !important;
            }
            .pdf-cover-metric {
                flex: 1 !important;
                background: rgba(123,45,69,0.04) !important;
                text-align: center !important;
                padding: 3mm 2mm !important;
                border-right: 1px solid rgba(123,45,69,0.12) !important;
            }
            .pdf-cover-metric:last-child { border-right: none !important; }
            .pdf-cover-metric-value {
                font-family: 'Playfair Display', Georgia, serif !important;
                font-size: 13pt !important;
                font-weight: 700 !important;
                color: #7B2D45 !important;
                line-height: 1 !important;
            }
            .pdf-cover-metric-label {
                font-size: 5.5pt !important;
                color: #8A7070 !important;
                margin-top: 1mm !important;
                text-transform: uppercase !important;
                letter-spacing: 0.05em !important;
            }
            /* Badges na faixa escura */
            .pdf-cover-badges {
                display: flex !important;
                flex-wrap: wrap !important;
                gap: 2mm !important;
                margin-top: 4mm !important;
            }
            .pdf-cover-badge {
                display: flex !important;
                align-items: center !important;
                gap: 1.5mm !important;
                background: rgba(255,255,255,0.12) !important;
                border: 1px solid rgba(255,255,255,0.2) !important;
                border-radius: 50px !important;
                padding: 1.5mm 4mm !important;
                font-size: 6.5pt !important;
                color: rgba(255,255,255,0.88) !important;
            }
            .pdf-cover-badge-icon { font-size: 7pt !important; }
            .pdf-cover-badge strong { color: #fff !important; font-weight: 700 !important; }
            /* Rodapé da capa */
            .pdf-cover-footer {
                margin-top: 4.5mm !important;
                padding-top: 3mm !important;
                border-top: 1px solid rgba(123,45,69,0.16) !important;
                display: flex !important;
                justify-content: space-between !important;
                align-items: center !important;
            }
            .pdf-cover-footer-name {
                font-size: 8.5pt !important;
                font-weight: 700 !important;
                color: #2C1A20 !important;
            }
            .pdf-cover-footer-role {
                font-size: 6.5pt !important;
                color: #7B2D45 !important;
                font-weight: 400 !important;
                margin-top: 0.5mm !important;
            }
            .pdf-cover-footer-contacts {
                font-size: 7pt !important;
                color: #7B2D45 !important;
                display: flex !important;
                gap: 5mm !important;
            }
            .pdf-cover-footer-date {
                font-size: 6.5pt !important;
                color: rgba(122,85,96,0.5) !important;
            }

            /* ══════════════════════════════════════════
               SEÇÕES INTERNAS
               ══════════════════════════════════════════ */
            section:not(#hero) {
                position: static !important;
                overflow: visible !important;
                min-height: 0 !important;
                max-height: none !important;
                width: 100% !important;
                padding: 0 !important;
                box-sizing: border-box !important;
            }
            section:not(#hero) .container {
                max-width: 100% !important;
                padding: 0 !important;
            }

            /* Cabeçalhos de seção */
            .section-heading { margin-bottom: 4mm !important; }
            .section-heading h2 {
                font-size: 16pt !important;
                margin-bottom: 1.5mm !important;
                background: none !important;
                -webkit-text-fill-color: #2C1A20 !important;
                color: #2C1A20 !important;
            }
            .section-heading p { font-size: 8pt !important; color: #8A7070 !important; }
            .section-tag {
                font-size: 6pt !important;
                padding: 0.8mm 2.5mm !important;
                margin-bottom: 1.5mm !important;
                color: #7B2D45 !important;
                background: rgba(123,45,69,0.08) !important;
                border-color: rgba(123,45,69,0.2) !important;
            }

            /* ══ QUEBRAS DE PÁGINA ══
               Pág 1: Capa (cover)
               Pág 2: Sobre + Serviços
               Pág 3: Processo + Ferramentas
               Pág 4: Portfólio
               Pág 5: Minha Bolsa + Formação (+métricas/parcerias/depoimentos se visíveis)
               Pág 6: Contato
            */
            #sobre       { page-break-before: always !important; break-before: page !important; }
            #servicos    { page-break-before: avoid  !important; break-before: avoid  !important; }
            #processo    { page-break-before: always !important; break-before: page !important; }
            #ferramentas { page-break-before: avoid  !important; break-before: avoid  !important; }
            #portfolio   { page-break-before: always !important; break-before: page !important; }
            #bag-section { page-break-before: always !important; break-before: page !important; }
            #formacao    { page-break-before: avoid  !important; break-before: avoid  !important; }
            #metricas    { page-break-before: avoid  !important; break-before: avoid  !important; }
            #parcerias   { page-break-before: avoid  !important; break-before: avoid  !important; }
            #depoimentos { page-break-before: avoid  !important; break-before: avoid  !important; }
            #contato     { page-break-before: always !important; break-before: page !important; }

            /* Espaçamento padrão entre seções */
            section:not(#hero) {
                padding-top: 7mm !important;
                padding-bottom: 4mm !important;
            }

            /* ══ SOBRE ══ */
            .about-grid {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 6mm !important;
                margin-bottom: 4mm !important;
            }
            .about-text { font-size: 8.5pt !important; line-height: 1.75 !important; color: #2C1A20 !important; }
            .polaroid-grid {
                display: grid !important;
                grid-template-columns: repeat(4,1fr) !important;
                gap: 2.5mm !important; margin-bottom: 4mm !important;
            }
            .polaroid {
                transform: none !important; --rot: 0deg !important;
                page-break-inside: avoid !important; break-inside: avoid !important;
                box-shadow: 0 2px 6px rgba(44,26,32,0.1) !important;
            }
            .polaroid-img { height: 28mm !important; overflow: hidden !important; display: block !important; }
            img.polaroid-img { width: 100% !important; object-fit: cover !important; }
            .polaroid-img img { width:100% !important; height:100% !important; object-fit:cover !important; }
            .polaroid-caption { font-size: 6.5pt !important; color: #8A7070 !important; }
            .highlights {
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 3mm !important;
                margin-top: 0 !important;
            }
            .highlight-card {
                page-break-inside: avoid !important; break-inside: avoid !important;
                padding: 4mm !important;
                background: rgba(123,45,69,0.04) !important;
                border-color: rgba(123,45,69,0.14) !important;
                border-radius: 8px !important;
            }
            .highlight-icon  { font-size: 12pt !important; color: #7B2D45 !important; margin-bottom: 1.5mm !important; }
            .highlight-title { font-size: 8.5pt !important; color: #2C1A20 !important; }
            .highlight-text  { font-size: 7.5pt !important; color: #8A7070 !important; }

            /* ══ SERVIÇOS ══ */
            .services-grid {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 4mm !important;
            }
            .service-card {
                page-break-inside: avoid !important; break-inside: avoid !important;
                padding: 5mm !important;
                background: rgba(123,45,69,0.03) !important;
                border-color: rgba(123,45,69,0.14) !important;
                border-radius: 8px !important;
            }
            .service-icon  { color: #7B2D45 !important; font-size: 14pt !important; }
            .service-title { font-size: 10pt !important; color: #2C1A20 !important; }
            .service-desc  { font-size: 8pt !important; line-height: 1.6 !important; color: #8A7070 !important; }
            .tag {
                font-size: 6.5pt !important;
                color: #7B2D45 !important;
                background: rgba(123,45,69,0.09) !important;
            }

            /* ══ PROCESSO ══ */
            .process-steps {
                display: grid !important;
                grid-template-columns: repeat(4,1fr) !important;
                gap: 4mm !important;
                margin-bottom: 5mm !important;
            }
            .process-steps::before { display: none !important; }
            .step {
                page-break-inside: avoid !important; break-inside: avoid !important;
                padding: 5mm !important;
                background: rgba(123,45,69,0.03) !important;
                border-color: rgba(123,45,69,0.14) !important;
                border-radius: 8px !important;
                text-align: center !important;
            }
            .step-number { font-size: 22pt !important; color: #7B2D45 !important; }
            .step-icon   { font-size: 14pt !important; margin: 2mm 0 !important; color: #A84C65 !important; }
            .step-title  { font-size: 9pt !important; color: #2C1A20 !important; }
            .step-desc   { font-size: 7.5pt !important; color: #8A7070 !important; }

            /* ══ FERRAMENTAS ══ */
            .tools-grid {
                display: grid !important;
                grid-template-columns: repeat(4,1fr) !important;
                gap: 4mm !important;
            }
            .tool-category {
                page-break-inside: avoid !important; break-inside: avoid !important;
                padding: 4.5mm !important;
                background: rgba(123,45,69,0.03) !important;
                border-color: rgba(123,45,69,0.14) !important;
                border-radius: 8px !important;
            }
            .tool-header { margin-bottom: 2.5mm !important; }
            .tool-icon   { font-size: 12pt !important; color: #7B2D45 !important; margin-bottom: 1mm !important; }
            .tool-name   { font-size: 8.5pt !important; color: #2C1A20 !important; }
            .tool-pill   { font-size: 6.5pt !important; padding: 0.6mm 2mm !important; color: #7B2D45 !important; background: rgba(123,45,69,0.09) !important; }

            /* ══ PORTFÓLIO ══ */
            .portfolio-grid {
                display: grid !important;
                grid-template-columns: repeat(3,1fr) !important;
                gap: 4mm !important;
            }
            .portfolio-item {
                page-break-inside: avoid !important; break-inside: avoid !important;
                aspect-ratio: 1 !important;
                overflow: hidden !important;
                border-radius: 8px !important;
                position: relative !important;
            }
            .portfolio-overlay {
                opacity: 1 !important;
                position: absolute !important; inset: 0 !important;
                background: linear-gradient(to top, rgba(44,26,32,0.9) 0%, rgba(44,26,32,0.35) 55%, transparent 100%) !important;
                display: flex !important; align-items: flex-end !important; padding: 3.5mm !important;
            }
            .portfolio-info { width: 100% !important; }
            .portfolio-category {
                color: rgba(245,194,199,0.9) !important;
                -webkit-text-fill-color: rgba(245,194,199,0.9) !important;
                font-size: 6pt !important; font-weight: 700 !important;
                text-transform: uppercase !important; letter-spacing: 0.1em !important;
                margin-bottom: 1mm !important;
            }
            .portfolio-caption {
                color: #fff !important; -webkit-text-fill-color: #fff !important;
                font-size: 8pt !important; font-weight: 600 !important; line-height: 1.3 !important;
            }
            .portfolio-bg { width:100% !important; height:100% !important; position:absolute !important; inset:0 !important; }
            .portfolio-bg img { width:100% !important; height:100% !important; object-fit:cover !important; }
            .portfolio-icon   { font-size: 20pt !important; }

            /* ══ MINHA BOLSA ══ */
            #bag-section { min-height: 0 !important; overflow: visible !important; background: #FAF7F4 !important; }
            #bag-section::before { display: none !important; }
            .bag-grid {
                display: grid !important;
                grid-template-columns: repeat(3,1fr) !important;
                gap: 4mm !important;
                margin-top: 0 !important;
            }
            .bag-item {
                page-break-inside: avoid !important; break-inside: avoid !important;
                padding: 5mm !important; overflow: visible !important;
                border-radius: 8px !important;
                background: #fff !important;
                border-color: rgba(123,45,69,0.14) !important;
            }
            .bag-item::before { display: none !important; }
            .bag-emoji { font-size: 15pt !important; margin-bottom: 2mm !important; }
            .bag-skill { font-size: 9pt !important; color: #2C1A20 !important; }
            .bag-desc  { font-size: 7.5pt !important; line-height: 1.55 !important; color: #8A7070 !important; }

            /* ══ FORMAÇÃO ══ */
            .timeline { overflow: visible !important; }
            .timeline::before { left: 6mm !important; background: linear-gradient(to bottom, #7B2D45, transparent) !important; }
            .timeline-item {
                page-break-inside: avoid !important; break-inside: avoid !important;
                padding: 3.5mm 0 3.5mm 14mm !important;
                border-bottom-color: rgba(123,45,69,0.12) !important;
            }
            .timeline-dot  { left: 3.5mm !important; width: 5mm !important; height: 5mm !important; border-color: #A84C65 !important; }
            .timeline-icon { display: none !important; }
            .timeline-title       { font-size: 9.5pt !important; color: #2C1A20 !important; margin-bottom: 0.5mm !important; }
            .timeline-institution { font-size: 8pt !important; color: #7B2D45 !important; }
            .timeline-year        { font-size: 7.5pt !important; color: #8A7070 !important; }
            .timeline-desc        { font-size: 7.5pt !important; color: #8A7070 !important; margin-top: 1mm !important; }

            /* ══ MÉTRICAS ══ */
            .metrics-grid {
                display: grid !important; grid-template-columns: repeat(4,1fr) !important; gap: 4mm !important;
            }
            .metric-card {
                page-break-inside: avoid !important; break-inside: avoid !important; padding: 5mm !important;
                background: rgba(123,45,69,0.04) !important; border-color: rgba(123,45,69,0.14) !important;
            }
            .metric-icon  { font-size: 12pt !important; color: #7B2D45 !important; margin-bottom: 2mm !important; }
            .metric-value { font-size: 16pt !important; color: #7B2D45 !important; }
            .metric-label { font-size: 7pt !important; color: #8A7070 !important; }

            /* ══ PARCERIAS ══ */
            .partners-grid { display: grid !important; grid-template-columns: repeat(4,1fr) !important; gap: 4mm !important; }
            .partner-card  {
                page-break-inside: avoid !important; break-inside: avoid !important; padding: 4mm !important;
                background: rgba(123,45,69,0.03) !important; border-color: rgba(123,45,69,0.14) !important;
            }
            .partner-name  { font-size: 8.5pt !important; color: #2C1A20 !important; }
            .partner-category { font-size: 7pt !important; color: #8A7070 !important; }

            /* ══ DEPOIMENTOS ══ */
            .testimonials-grid {
                display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 4mm !important;
            }
            .testimonial-card {
                page-break-inside: avoid !important; break-inside: avoid !important; padding: 5mm !important;
                background: rgba(123,45,69,0.03) !important; border: 1px solid rgba(123,45,69,0.12) !important;
            }
            .testimonial-gradient { display: none !important; }
            .testimonial-text { font-size: 8.5pt !important; color: #2C1A20 !important; }
            .author-role { font-size: 7.5pt !important; color: #8A7070 !important; }
            .star { color: #7B2D45 !important; }

            /* ══ CONTATO ══ */
            #contato .container { text-align: center !important; padding: 0 !important; margin-bottom: 6mm !important; }
            #contato h2 {
                font-size: 17pt !important;
                color: #2C1A20 !important;
                -webkit-text-fill-color: #2C1A20 !important;
                background: none !important;
            }
            #contato .section-heading p { color: #8A7070 !important; }

            /* ══ BLOCO CONTATO PDF ══ */
            #pdf-contact-block {
                display: block !important;
                margin-top: 0 !important;
            }
            .pdf-contact-layout {
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                gap: 6mm !important;
            }
            .pdf-contact-right {
                width: 100% !important;
                display: flex !important;
                flex-direction: column !important;
                gap: 5mm !important;
            }
            .pdf-contact-grid {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 3.5mm !important;
            }
            .pdf-contact-card {
                background: rgba(123,45,69,0.05) !important;
                border: 1px solid rgba(123,45,69,0.18) !important;
                border-radius: 8px !important;
                padding: 5mm 6mm !important;
                display: flex !important;
                align-items: center !important;
                gap: 4mm !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }
            .pdf-contact-icon {
                width: 9mm !important; height: 9mm !important;
                border-radius: 50% !important;
                background: linear-gradient(135deg, #7B2D45, #5A1F31) !important;
                display: flex !important; align-items: center !important; justify-content: center !important;
                flex-shrink: 0 !important;
                font-size: 10pt !important; color: #fff !important;

        /* Corrige erros tipográficos comuns nos dados salvos */
        function fixTypos(d) {
            const fix = s => (s || '')
                .replace(/\bPsente\b/gi, 'Presente')
                .replace(/\bPrezente\b/gi, 'Presente')
                .replace(/\bprezente\b/gi, 'presente')
                .replace(/\bPresnte\b/gi, 'Presente')
                .replace(/\bandamento\b/gi, 'andamento') // já correto
                .trim();

            // Formação
            if (d.formacao && d.formacao.items) {
                d.formacao.items = d.formacao.items.map(item => ({
                    ...item,
                    year:        fix(item.year),
                    title:       fix(item.title),
                    institution: fix(item.institution),
                    desc:        fix(item.desc)
                }));
            }
            // Serviços
            if (d.servicos && d.servicos.items) {
                d.servicos.items = d.servicos.items.map(item => ({
                    ...item,
                    title: fix(item.title),
                    desc:  fix(item.desc)
                }));
            }
            // Depoimentos
            if (d.depoimentos && d.depoimentos.items) {
                d.depoimentos.items = d.depoimentos.items.map(item => ({
                    ...item,
                    text: fix(item.text),
                    name: fix(item.name),
                    role: fix(item.role)
                }));

            // Sobre
            if (d.sobre) {
                if (d.sobre.text1) d.sobre.text1 = fix(d.sobre.text1);

            }
            return d;
        }

        function migrateColors(d) {
            if (!d.colors) return;
            const bg = (d.colors.bg0 || '').toLowerCase();
            const isDark = DARK_BG_DETECT.some(p => bg.startsWith(p));
            if (isDark) {
                // usuário tinha tema escuro antigo — aplicar novo tema rosa
                d.colors = JSON.parse(JSON.stringify(DEFAULTS.colors));
                console.log('Migração: tema escuro → tema rosa feminino');
            }
        }

        async function loadData() {
            // senha sempre do localStorage (nunca no Firebase)
            const storedPwd = localStorage.getItem(SK_PWD);

            if (window._fbReady) {
                try {
                    const remote = await window._fb.loadData();
                    if (remote) {
                        D = remote;
                        Object.keys(DEFAULTS).forEach(k => {
                            if (!(k in D)) D[k] = JSON.parse(JSON.stringify(DEFAULTS[k]));
                        });
                        migrateColors(D);
                        fixTypos(D);
                        D.meta.password = storedPwd || DEFAULTS.meta.password;
                        return;
                    }
                } catch(e) {
                    console.warn('Firebase loadData falhou, usando localStorage:', e);
                }
            }
            // fallback localStorage
            const stored = localStorage.getItem(SK);
            D = stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(DEFAULTS));
            Object.keys(DEFAULTS).forEach(k => {
                if (!(k in D)) D[k] = JSON.parse(JSON.stringify(DEFAULTS[k]));
            });
            migrateColors(D);
            fixTypos(D);
            D.meta.password = storedPwd || DEFAULTS.meta.password;
        }

        // ── saveData: Firebase + localStorage (fallback) ──────────────────────────
        async function saveData() {
            // senha sempre em localStorage separado
            localStorage.setItem(SK_PWD, D.meta.password);

            // processa dados ANTES de qualquer persistência
            const cleanData = _stripHeavyData(D);

            // tenta salvar no Firebase
            if (window._fbReady) {
                try {
                    await window._fb.saveData(cleanData); // passa já limpo
                    // cache offline no localStorage
                    _saveLocalFallback(cleanData);
                    return;
                } catch(e) {
                    console.warn('Firebase saveData falhou, salvando localmente:', e);
                }
            }
            _saveLocalFallback(cleanData);
        }

        function _stripHeavyData(D) {
            // Remove TODOS os base64 antes de salvar — Firestore tem limite de 1MB por documento
            const toSave = JSON.parse(JSON.stringify(D));
            delete toSave.meta.password;

            // foto de perfil: remove base64 só se já existe URL permanente no Storage
            if (toSave.identity) {
                const ph = toSave.identity.photo || '';
                if (ph.startsWith('data:') && toSave.identity.photoPath) {
                    delete toSave.identity.photo;
                }
            }

            if (toSave.portfolio && toSave.portfolio.posts) {
                toSave.portfolio.posts = toSave.portfolio.posts.map(p => {
                    const c = Object.assign({}, p);
                    delete c.video;
                    const img = c.image || '';
                    // só remove base64 se JÁ existe URL permanente do Storage (imagePath presente)
                    if (img.startsWith('data:') && c.imagePath) delete c.image;
                    const th = c.thumb || '';
                    if (th.startsWith('data:') && th.length > 50000) delete c.thumb;
                    return c;
                });
            }
            // Limpa base64 dos polaroids (Sobre)
            if (toSave.polaroids && toSave.polaroids.items) {
                toSave.polaroids.items = toSave.polaroids.items.map(p => {
                    const c = Object.assign({}, p);
                    const img = c.image || '';
                    // só remove base64 se JÁ foi enviado ao Storage
                    if (img.startsWith('data:') && c.imagePath) delete c.image;
                    return c;
                });
            }
            // Limpa base64 dos reels da seção separada também
            if (toSave.reels && toSave.reels.posts) {
                toSave.reels.posts = toSave.reels.posts.map(p => {
                    const c = Object.assign({}, p);
                    delete c.video; // base64 nunca persiste
                    const th = c.thumb || '';
                    if (th.startsWith('data:') && th.length > 50000) delete c.thumb;
                    return c;
                });
            }
            return toSave;
        }

        function _saveLocalFallback(cleanData) {
            try {
                // usa dados já processados se disponíveis, senão processa agora
                const toSave = cleanData || _stripHeavyData(D);
                localStorage.setItem(SK, JSON.stringify(toSave));
            } catch(e) {
                if (e.name === 'QuotaExceededError') console.warn('localStorage cheio');
            }
        }

        function gp(path) { return path.split('.').reduce((obj, key) => obj?.[key], D); }

        function sp(path, val) {
            const keys = path.split('.');
            let obj = D;
            for (let i = 0; i < keys.length - 1; i++) {
                if (!(keys[i] in obj)) obj[keys[i]] = {};
                obj = obj[keys[i]];
            }
            obj[keys[keys.length - 1]] = val;
        }

        function buildReels() {
            if (!D.reels || !D.reels.visible) return '';

            if (!posts || posts.length === 0) return '';

            const slides = posts.map((p, i) => {
                const videoSrc = p.videoURL || p.video || null;
                const thumb = p.thumb ? `poster="${p.thumb}"` : '';
                const inner = videoSrc
                    ? `<video src="${videoSrc}" ${thumb} muted loop playsinline preload="metadata" style="width:100%;height:100%;object-fit:cover;display:block;"></video>`
                    : `<div class="reel-placeholder"><i class="fab fa-instagram"></i><span>Adicione um vídeo pelo painel admin</span></div>`;
                return `
                <div class="reel-slide" data-index="${i}">
                    <div class="iphone-frame">
                        <div class="dynamic-island"></div>
                        <div class="iphone-screen">
                            ${inner}

                                <div class="reel-cap">${p.caption || ''}</div>
                            </div>
                            <div class="iphone-play-btn"><i class="fas fa-play"></i></div>
                            <div class="iphone-progress"><div class="iphone-progress-bar"></div></div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            const dots = posts.map((_, i) => `<div class="reels-dot${i === 0 ? ' active' : ''}" data-dot="${i}"></div>`).join('');

            return `
            <section id="reels-section">
                <div class="container">

                        <p>${subtitle}</p>

                    </div>
                    <div class="reels-dots" id="reels-dots">${dots}</div>
                </div>
            </section>`;
        }

        // ── Carrossel de Reels (iPhone mockup) ───────────────────────────────────
        function initReelsCarousel() {
            const track = document.getElementById('reels-track');
            if (!track) return;
            const slides = Array.from(track.querySelectorAll('.reel-slide'));
            if (slides.length === 0) return;

            let current = 0;
            let progressInterval = null;

            const positions = ['pos-hidden-left','pos-left','pos-center','pos-right','pos-hidden-right'];

            function getPos(slideIdx, currentIdx, total) {
                const diff = (slideIdx - currentIdx + total) % total;
                if (diff === 0) return 'pos-center';
                if (diff === 1) return 'pos-right';
                if (diff === total - 1) return 'pos-left';
                if (diff === 2) return 'pos-hidden-right';
                return 'pos-hidden-left';
            }

            function updateSlides() {
                slides.forEach((slide, i) => {
                    slide.className = 'reel-slide ' + getPos(i, current, slides.length);
                });
                // Dots
                const dots = document.querySelectorAll('.reels-dot');
                dots.forEach((d, i) => d.classList.toggle('active', i === current));
            }

            function stopProgress() {
                clearInterval(progressInterval);
                document.querySelectorAll('.iphone-progress-bar').forEach(b => b.style.width = '0%');
            }

            function startProgress(video, bar) {
                stopProgress();
                progressInterval = setInterval(() => {
                    if (!video.duration) return;
                    bar.style.width = ((video.currentTime / video.duration) * 100) + '%';
                }, 100);
            }

            function playCenter() {
                const centerSlide = slides[current];
                const video = centerSlide.querySelector('video');
                const bar = centerSlide.querySelector('.iphone-progress-bar');
                if (!video) return;
                video.play().then(() => {
                    centerSlide.classList.add('is-playing');
                    if (bar) startProgress(video, bar);
                }).catch(() => {});
            }

            function pauseAll() {
                slides.forEach(slide => {
                    const v = slide.querySelector('video');
                    if (v) v.pause();
                    slide.classList.remove('is-playing');
                });
                stopProgress();
            }

            function goTo(idx) {
                pauseAll();
                current = (idx + slides.length) % slides.length;
                updateSlides();
                // pequeno delay para transição CSS completar
                setTimeout(playCenter, 300);
            }

            // Click no slide lateral: vai para ele
            slides.forEach((slide, i) => {
                slide.addEventListener('click', () => {
                    if (slide.classList.contains('pos-center')) {
                        // toggle play/pause no central
                        const v = slide.querySelector('video');
                        if (!v) return;
                        if (v.paused) {
                            v.play().then(() => { slide.classList.add('is-playing'); }).catch(()=>{});
                        } else {
                            v.pause();
                            slide.classList.remove('is-playing');
                        }
                    } else {
                        goTo(i);
                    }
                });
            });

            // Botões prev/next
            const prevBtn = document.getElementById('reels-prev');
            const nextBtn = document.getElementById('reels-next');
            if (prevBtn) prevBtn.addEventListener('click', () => goTo(current - 1));
            if (nextBtn) nextBtn.addEventListener('click', () => goTo(current + 1));

            // Dots
            document.querySelectorAll('.reels-dot').forEach((dot, i) => {
                dot.addEventListener('click', () => goTo(i));
            });

            // Swipe touch
            let touchStartX = 0;
            track.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
            track.addEventListener('touchend', e => {
                const diff = touchStartX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) goTo(current + (diff > 0 ? 1 : -1));
            });

            // Inicializa posições
            updateSlides();
            // Toca o primeiro automaticamente se possível
            setTimeout(playCenter, 600);
        }

            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
        }

            const pwd = document.getElementById('adm-pwd').value;

        function applyColors() {
            const c = D.colors || {};
            // Migrar cores escuras salvas para claro
            const bg = (c.bg0 || '').toLowerCase();
            if (DARK_BG_DETECT && DARK_BG_DETECT.some(p => bg.startsWith(p))) {
                D.colors = JSON.parse(JSON.stringify(DEFAULTS.colors));
                return applyColors(); // re-chamar com cores corretas
            }
            const root = document.documentElement;
            if (c.bg0)    root.style.setProperty('--bg0', c.bg0);
            if (c.bg1)    root.style.setProperty('--bg1', c.bg1);
            if (c.bgc)    root.style.setProperty('--bgc', c.bgc);
            if (c.gold)   root.style.setProperty('--gold', c.gold);
            if (c.gold_l) root.style.setProperty('--gold-l', c.gold_l);
            if (c.gold_d) root.style.setProperty('--gold-d', c.gold_d);
            if (c.rose)   root.style.setProperty('--rose', c.rose);
            if (c.rose_l) root.style.setProperty('--rose-l', c.rose_l);
            if (c.t1)     root.style.setProperty('--t1', c.t1);
            if (c.t2)     root.style.setProperty('--t2', c.t2);
            const g = c.gold || '#C9A84C';
            const gl = c.gold_l || '#E2C97E';
            const gd = c.gold_d || '#9A7A2A';
            root.style.setProperty('--border', `rgba(${hexToRgb(g)}, 0.18)`);
            root.style.setProperty('--border-gold', `rgba(${hexToRgb(g)}, 0.2)`);
            root.style.setProperty('--grad', `linear-gradient(135deg, ${g}, ${gl}, ${gd})`);
        }

        function hexToRgb(hex) {
            const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return r ? `${parseInt(r[1],16)}, ${parseInt(r[2],16)}, ${parseInt(r[3],16)}` : '201, 168, 76';
        }

        function toggleReelVideo(item) {
            const video = item.querySelector('video');
            const hint  = item.querySelector('.reel-play-hint');
            if (!video) return;
            if (video.paused) {
                // pausa todos os outros reels antes de tocar este
                document.querySelectorAll('.reel-item video').forEach(v => {
                    if (v !== video) {
                        v.pause();
                        const h = v.closest('.reel-item').querySelector('.reel-play-hint');
                        if (h) { h.style.opacity = '1'; h.querySelector('.reel-play-icon i').className = 'fas fa-play'; }
                    }
                });
                video.play().then(() => {
                    if (hint) { hint.style.opacity = '0'; }
                }).catch(() => {
                    // fallback: abre em nova aba se autoplay bloqueado
                });
                item.classList.add('playing');
            } else {
                video.pause();
                if (hint) { hint.style.opacity = '1'; }
                item.classList.remove('playing');
            }
        }

        /**
         * Comprime imagem para JPEG máx maxPx, qualidade quality.
         * Retorna { dataUrl, blob } — blob para upload no Storage, dataUrl para preview local.
         */
        function compressImage(file, maxPx = 1200, quality = 0.78) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        if (width > maxPx || height > maxPx) {
                            if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
                            else { width = Math.round(width * maxPx / height); height = maxPx; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', quality);
                        canvas.toBlob(blob => resolve({ dataUrl, blob }), 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                    img.src = evt.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function handlePhotoUpload(e) {
            if (!e.target.files[0]) return;
            notify('Carregando foto...', 'success');
            const { dataUrl, blob } = await compressImage(e.target.files[0], 800, 0.82);
            sp('identity.photo', dataUrl); // preview imediato
            showTab('identidade');
            if (window._fbReady && window._fb) {
                try {
                    // remove foto antiga do Storage se existir
                    const oldPath = D.identity.photoPath;
                    if (oldPath) await window._fb.deleteImage(oldPath);
                    const { url, path } = await window._fb.uploadImage(blob, 'photos', 'profile');
                    sp('identity.photo', url);
                    sp('identity.photoPath', path);
                    await saveData();
                    showTab('identidade');
                    notify('Foto salva!', 'success');
                } catch(err) {
                    console.error('Upload foto falhou:', err);
                    await saveData();
                    notify('Foto salva localmente (Firebase indisponível)', 'error');
                }
            } else {
                await saveData();
            }
        }
