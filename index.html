        async function handlePortfolioVideo(e, index) {
            if (!e.target.files[0]) return;
            const file = e.target.files[0];
            if (file.size > 300 * 1024 * 1024) {
                notify('Vídeo muito grande (máx 300MB)', 'error');
                return;
            }
            notify('Fazendo upload do vídeo...', 'success');

            // 1. Lê o arquivo para gerar thumb e reprodução local imediata
            const reader = new FileReader();
            reader.onload = async (evt) => {
                const b64 = evt.target.result;
                sp('portfolio.posts.' + index + '.video', b64); // memória — exibição imediata

                // Gera thumbnail do primeiro frame
                const vid = document.createElement('video');
                vid.src = b64;
                vid.currentTime = 0.5;
                vid.addEventListener('seeked', async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    const vw = vid.videoWidth, vh = vid.videoHeight;
                    const size = Math.min(vw, vh);
                    ctx.drawImage(vid, (vw-size)/2, (vh-size)/2, size, size, 0, 0, 400, 400);
                    const thumb = canvas.toDataURL('image/jpeg', 0.6);
                    sp('portfolio.posts.' + index + '.thumb', thumb);
                    showTab('portfolio');

                    // 2. Upload para Firebase Storage (URL permanente)
                    if (window._fbReady) {
                        try {
                            // remove vídeo antigo do Storage se existir
                            const oldPath = D.portfolio.posts[index].videoPath;
                            if (oldPath) await window._fb.deleteVideo(oldPath);

                            const { url, path } = await window._fb.uploadVideo(file, index);
                            sp('portfolio.posts.' + index + '.videoURL', url);
                            sp('portfolio.posts.' + index + '.videoPath', path);
                            sp('portfolio.posts.' + index + '.video', url); // aponta para URL permanente
                            await saveData();
                            showTab('portfolio');
                            notify('Reel salvo permanentemente!', 'success');
                        } catch(err) {
                            console.error('Upload Firebase falhou:', err);
                            await saveData();
                            notify('Upload falhou — vídeo salvo localmente (some ao recarregar)', 'error');
                        }
                    } else {
                        await saveData();
                        notify('Firebase indisponível — vídeo em memória temporária', 'error');
                    }
                }, { once: true });
            };
            reader.readAsDataURL(file);
        }

        // ── Handlers dos Polaroids (Seção Sobre) ────────────────────────────────
        function addPolaroidItem() {
            if (!D.polaroids) D.polaroids = { items: [] };
            if (!D.polaroids.items) D.polaroids.items = [];
            D.polaroids.items.push({ image: null, caption: 'momento ' + (D.polaroids.items.length + 1) });
            showTab('sobre_fotos');
        }

        async function removePolaroidItem(index) {
            const p = D.polaroids.items[index];
            if (p && p.imagePath && window._fbReady) {
                try { await window._fb.deleteImage(p.imagePath); } catch(e) {}
            }
            D.polaroids.items.splice(index, 1);
            await saveData();
            renderAll();
            showTab('sobre_fotos');
        }

        async function removePolaroidImage(index) {
            const p = D.polaroids.items[index];
            if (p && p.imagePath && window._fbReady) {
                try { await window._fb.deleteImage(p.imagePath); } catch(e) {}
            }
            D.polaroids.items[index].image = null;
            D.polaroids.items[index].imagePath = null;
            await saveData();
            renderAll();
            showTab('sobre_fotos');
        }

        async function handlePolaroidImage(e, index) {
            if (!e.target.files[0]) return;
            notify('Carregando foto...', 'success');
            const { dataUrl, blob } = await compressImage(e.target.files[0], 800, 0.82);
            D.polaroids.items[index].image = dataUrl;
            showTab('sobre_fotos');
            renderAll();
            if (window._fbReady && window._fb) {
                try {
                    const oldPath = D.polaroids.items[index].imagePath;
                    if (oldPath) await window._fb.deleteImage(oldPath);
                    const { url, path } = await window._fb.uploadImage(blob, 'polaroids', 'pol_' + index);
                    D.polaroids.items[index].image = url;
                    D.polaroids.items[index].imagePath = path;
                    await saveData();
                    renderAll();
                    showTab('sobre_fotos');
                    notify('Foto salva!', 'success');
                } catch(err) {
                    await saveData();
                    notify('Foto salva localmente', 'error');
                }
            } else {
                await saveData();
            }
        }

        // ── Handlers da seção Reels separada ────────────────────────────────────
        function addReelItem() {
            if (!D.reels) D.reels = { visible: true, title: 'Reels', subtitle: '', username: '', posts: [] };
            if (!D.reels.posts) D.reels.posts = [];
            D.reels.posts.push({ video: null, videoURL: null, videoPath: null, thumb: null, category: 'Reel', caption: '' });
            showTab('reels_section');
        }

        async function removeReelItem(index) {
            const post = D.reels.posts[index];
            if (post && post.videoPath && window._fbReady) {
                try { await window._fb.deleteVideo(post.videoPath); } catch(e) {}
            }
            D.reels.posts.splice(index, 1);
            await saveData();
            renderAll();
            showTab('reels_section');
        }

        async function removeReelVideo(index) {
            const post = D.reels.posts[index];
            if (post && post.videoPath && window._fbReady) {
                try { await window._fb.deleteVideo(post.videoPath); } catch(e) {}
            }
            D.reels.posts[index].video = null;
            D.reels.posts[index].videoURL = null;
            D.reels.posts[index].videoPath = null;
            D.reels.posts[index].thumb = null;
            await saveData();
            showTab('reels_section');
        }

        async function handleReelVideo(e, index) {
            if (!e.target.files[0]) return;
            const file = e.target.files[0];
            if (file.size > 300 * 1024 * 1024) { notify('Vídeo muito grande (máx 300MB)', 'error'); return; }
            notify('Fazendo upload do reel...', 'success');
            const reader = new FileReader();
            reader.onload = async (evt) => {
                const b64 = evt.target.result;
                D.reels.posts[index].video = b64;
                const vid = document.createElement('video');
                vid.src = b64;
                vid.currentTime = 0.5;
                vid.addEventListener('seeked', async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 711; // 9:16
                    const ctx = canvas.getContext('2d');
                    const vw = vid.videoWidth, vh = vid.videoHeight;
                    ctx.drawImage(vid, 0, 0, vw, vh, 0, 0, 400, 711);
                    D.reels.posts[index].thumb = canvas.toDataURL('image/jpeg', 0.6);
                    showTab('reels_section');
                    if (window._fbReady && window._fb) {
                        try {
                            const oldPath = D.reels.posts[index].videoPath;
                            if (oldPath) await window._fb.deleteVideo(oldPath);
                            const { url, path } = await window._fb.uploadVideo(file, 'rs_' + index);
                            D.reels.posts[index].videoURL = url;
                            D.reels.posts[index].videoPath = path;
                            D.reels.posts[index].video = url;
                            await saveData();
                            renderAll();
                            showTab('reels_section');
                            notify('Reel salvo!', 'success');
                        } catch(err) {
                            await saveData();
                            notify('Upload falhou — reel em memória temporária', 'error');
                        }
                    } else {
                        await saveData();
                    }
                }, { once: true });
            };
            reader.readAsDataURL(file);
        }

        async function removePortfolioVideo(index) {
            const post = D.portfolio.posts[index];
            if (post.videoPath && window._fbReady) {
                try { await window._fb.deleteVideo(post.videoPath); } catch(e) {}
            }
            sp('portfolio.posts.' + index + '.video', null);
            sp('portfolio.posts.' + index + '.videoURL', null);
            sp('portfolio.posts.' + index + '.videoPath', null);
            sp('portfolio.posts.' + index + '.thumb', null);
            await saveData();
            showTab('portfolio');
        }

        function exportPDF() {
            // ── Fecha painel admin ──
            const panel = document.getElementById('adm-panel');
            const fab   = document.getElementById('adm-fab');
            if (panel) panel.style.display = 'none';
            if (fab)   fab.style.display   = 'none';

            notify('Preparando PDF…', 'success');

            // ── Dados dinâmicos ──
            const id  = D.identity  || {};
            const h   = D.hero      || {};
            const svc = (D.servicos && D.servicos.items) ? D.servicos.items : [];
            const ct  = D.contato   || {};
            const met = (D.metricas && D.metricas.visible && D.metricas.items)
                        ? D.metricas.items.filter(m => m.value && m.value !== '—') : [];

            const now     = new Date();
            const dateStr = now.toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'});

            // ── Foto ──
            const photoHtml = id.photo
                ? `<img src="${id.photo}" alt="${id.name1 || ''}" />`
                : `<div class="pdf-cover-photo-placeholder">
                     <i class="fas fa-camera" style="font-size:1.5rem;opacity:0.3;display:block;margin-bottom:3px;"></i>
                     <span style="font-size:5pt;">Foto do perfil</span>
                   </div>`;

            // ── Cards de serviços (máx 6, 2 colunas) ──
            const serviceItems = svc.slice(0, 6).map(s =>
                `<div class="pdf-cover-service-card">
                    <div class="pdf-cover-service-icon"><i class="fas ${s.icon || 'fa-star'}"></i></div>
                    <div>
                        <div class="pdf-cover-service-title">${s.title || ''}</div>
                        <div class="pdf-cover-service-desc">${(s.desc || '').substring(0, 72)}${(s.desc || '').length > 72 ? '…' : ''}</div>
                        <div class="pdf-cover-service-tags">${(s.tags || '').split(',').map(t=>`<span>${t.trim()}</span>`).join('')}</div>
                    </div>
                </div>`
            ).join('');

            // ── Métricas (se preenchidas) ──
            const metricsRow = met.length > 0
                ? `<div class="pdf-cover-metrics">${met.slice(0,4).map(m =>
                    `<div class="pdf-cover-metric">
                        <div class="pdf-cover-metric-value">${m.value}</div>
                        <div class="pdf-cover-metric-label">${m.label}</div>
                    </div>`).join('')}</div>`
                : '';

            // ── Badges de hero ──
            const badgesHtml = (h.show_badges && (h.b1_label || h.b2_label))
                ? `<div class="pdf-cover-badges">
                    ${h.b1_label ? `<div class="pdf-cover-badge"><span class="pdf-cover-badge-icon">${h.b1_icon || '✨'}</span><span>${h.b1_label}: <strong>${h.b1_value || ''}</strong></span></div>` : ''}
                    ${h.b2_label ? `<div class="pdf-cover-badge"><span class="pdf-cover-badge-icon">${h.b2_icon || '📊'}</span><span>${h.b2_label}: <strong>${h.b2_value || ''}</strong></span></div>` : ''}
                    ${id.location ? `<div class="pdf-cover-badge"><span class="pdf-cover-badge-icon">📍</span><span>${id.location}</span></div>` : ''}
                   </div>`
                : '';

            // ── Contatos do rodapé ──
            const contacts = [];
            if (ct.whatsapp) contacts.push(`<span><i class="fab fa-whatsapp"></i> ${ct.whatsapp}</span>`);
            if (ct.email)    contacts.push(`<span><i class="fas fa-envelope"></i> ${ct.email}</span>`);
            if (ct.instagram)contacts.push(`<span><i class="fab fa-instagram"></i> ${ct.instagram}</span>`);
            if (ct.linkedin) contacts.push(`<span><i class="fab fa-linkedin"></i> ${ct.linkedin}</span>`);
            if (contacts.length === 0) contacts.push(`<span><i class="fas fa-map-marker-alt"></i> ${id.location || 'Brasil'}</span>`);

            // ── HTML da capa ──
            const coverHtml = `
<div id="pdf-cover">
    <div class="pdf-cover-top"></div>
    <div class="pdf-cover-hero">
        <div class="pdf-cover-text">
            <span class="pdf-cover-tag">${h.pill || 'Social Media & Estratégia Digital'}</span>
            <div class="pdf-cover-pill">PORTFÓLIO PROFISSIONAL</div>
            <div class="pdf-cover-name">
                ${id.name1 || 'Laura Vieira'}
                <span>${id.name2 || 'Arruda'}</span>
            </div>
            <div class="pdf-cover-subtitle">${id.subtitle || 'Especialista em Gestão de Redes Sociais'}</div>
            <div class="pdf-cover-bio">${id.bio || 'Direção visual e posicionamento estratégico com resultados mensuráveis.'}</div>
            ${badgesHtml}
        </div>
        <div class="pdf-cover-photo">${photoHtml}</div>
    </div>
    <div class="pdf-cover-bottom">
        ${metricsRow}
        <div class="pdf-cover-section-title">Especialidades & Serviços</div>
        <div class="pdf-cover-services">${serviceItems}</div>
        <div class="pdf-cover-footer">
            <div class="pdf-cover-footer-name">
                ${(id.name1 || '') + ' ' + (id.name2 || '')}
                <div class="pdf-cover-footer-role">${id.subtitle || ''}</div>
            </div>
            <div class="pdf-cover-footer-contacts">${contacts.join('')}</div>
            <div class="pdf-cover-footer-date">Gerado em ${dateStr}</div>
        </div>
    </div>
</div>`;

            // ── Insere capa no DOM antes do #root ──
            const root    = document.getElementById('root');
            const coverEl = document.createElement('div');
            coverEl.innerHTML = coverHtml;
            const coverNode = coverEl.firstElementChild;
            document.body.insertBefore(coverNode, root);

            // ── Dispara impressão ──
            setTimeout(() => {
                window.print();
                const restore = () => {
                    coverNode.remove();
                    if (panel) panel.style.display = '';
                    if (fab)   fab.style.display   = '';
                };
                window.addEventListener('afterprint', restore, { once: true });
                setTimeout(restore, 1500);
            }, 400);
        }

        async function exportJSON() {
            const toExport = JSON.parse(JSON.stringify(D));
            delete toExport.meta.password; // nunca exporta senha
            // remove vídeos base64 (pesados demais para JSON)
            if (toExport.portfolio && toExport.portfolio.posts) {
                toExport.portfolio.posts = toExport.portfolio.posts.map(p => {
                    if (p.type === 'reel') { const c = Object.assign({}, p); delete c.video; return c; }
                    return p;
                });
            }
            const json = JSON.stringify(toExport, null, 2);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
            a.download = 'portfolio-data.json';
            a.click();
            notify('Exportado!', 'success');
        }

        function importJSON() {
            document.getElementById('adm-import-file').click();
        }

        function handleImportFile(e) {
            const reader = new FileReader();
            reader.onload = async (evt) => {
                try {
                    const imported = JSON.parse(evt.target.result);
                    const currentPwd = D.meta.password;
                    Object.assign(D, imported);
                    D.meta.password = currentPwd;
                    applyColors();
                    await saveData();
                    renderAll();
                    notify('Importado!', 'success');
                } catch (err) {
                    notify('Erro ao importar', 'error');
                }
            };
            reader.readAsText(e.target.files[0]);
            e.target.value = '';
        }

        function notify(msg, type = 'success') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => {
                notif.style.animation = 'slideUp 0.3s ease reverse';
                setTimeout(() => notif.remove(), 300);
            }, 3000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const init = async () => {
                await loadData();
                applyColors();
                renderAll();
                document.getElementById('adm-fab').addEventListener('click', () => {
                    openAdminLogin();
                });
                document.getElementById('adm-pwd').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkPwd();
                });
            };

            // Se Firebase já carregou (module scripts são rápidos), inicia direto.
            // Caso contrário aguarda o evento, com timeout de 4s para fallback.
            const safeInit = () => {
                try { init(); } catch(e) { console.error('Init error:', e); }
            };

            if (window._fbReady !== undefined) {
                // Firebase já tentou inicializar (sucesso ou falha)
                safeInit();
            } else {
                let done = false;
                const timeout = setTimeout(() => {
                    if (!done) { done = true; console.warn('Firebase timeout — usando localStorage'); safeInit(); }
                }, 2000); // 2s é suficiente
                window.addEventListener('firebase-ready', () => {
                    if (!done) { done = true; clearTimeout(timeout); safeInit(); }
                });
            }
        });
    </script>
