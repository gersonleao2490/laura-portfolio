    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script>
        (function() {
            const firebaseConfig = {
                apiKey:            "AIzaSyAu3iSqBGQXHP3Z0oH-axlMf7G2PoWpKxE",
                authDomain:        "laura-portfolio-cc181.firebaseapp.com",
                projectId:         "laura-portfolio-cc181",
                storageBucket:     "laura-portfolio-cc181.firebasestorage.app",
                messagingSenderId: "839867448142",
                appId:             "1:839867448142:web:3bd614672fe4bf53617c1f"
            };

            try {
                const fbApp   = firebase.initializeApp(firebaseConfig);
                const db      = firebase.firestore();
                const storage = firebase.storage();
                const DOC_ID  = 'main';

                window._fb = {
                    async saveData(cleanData) {
                        // recebe dados já processados por _stripHeavyData no escopo global
                        await db.collection('portfolio').doc(DOC_ID).set(cleanData);
                    },

                    async loadData() {
                        const snap = await db.collection('portfolio').doc(DOC_ID).get();
                        return snap.exists ? snap.data() : null;
                    },

                    async uploadVideo(file, index) {
                        const path = 'reels/reel_' + index + '_' + Date.now() + '.mp4';
                        const storageRef = storage.ref(path);
                        await storageRef.put(file);
                        const url = await storageRef.getDownloadURL();
                        return { url: url, path: path };
                    },

                    async deleteVideo(path) {
                        if (!path) return;
                        try { await storage.ref(path).delete(); } catch(e) {}
                    },

                    // Upload de imagem para Storage — retorna URL permanente
                    async uploadImage(blob, folder, name) {
                        const path = folder + '/' + name + '_' + Date.now() + '.jpg';
                        const storageRef = storage.ref(path);
                        await storageRef.put(blob, { contentType: 'image/jpeg' });
                        const url = await storageRef.getDownloadURL();
                        return { url: url, path: path };
                    },

                    async deleteImage(path) {
                        if (!path) return;
                        try { await storage.ref(path).delete(); } catch(e) {}
                    }
                };

                window._fbReady = true;
                window.dispatchEvent(new Event('firebase-ready'));
                console.log('Firebase inicializado com sucesso.');
            } catch(err) {
                console.error('Erro ao inicializar Firebase:', err);
                window._fbReady = false;
                window.dispatchEvent(new Event('firebase-ready'));
            }
        })();
    </script>

        const SK_PWD = 'lva_pwd_v3'; // chave separada — senha nunca vai pro JSON exportável

        // ── loadData: Firebase primeiro, localStorage como fallback ──────────────
        async function loadData() {
            // senha sempre do localStorage (nunca no Firebase)
            const storedPwd = localStorage.getItem(SK_PWD);

            if (window._fbReady) {
                try {
                    const remote = await window._fb.loadData();
                    if (remote) {
                        D = remote;
                        // preenche chaves ausentes com defaults
                        Object.keys(DEFAULTS).forEach(k => {
                            if (!(k in D)) D[k] = JSON.parse(JSON.stringify(DEFAULTS[k]));
                        });
                        D.meta.password = storedPwd || DEFAULTS.meta.password;
                        return;
                    }
                } catch(e) {
                    console.warn('Firebase loadData falhou, usando localStorage:', e);
                }
            }
            // fallback localStorage
            const stored = localStorage.getItem(SK);
            D = stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(DEFAULTS));
            Object.keys(DEFAULTS).forEach(k => {
                if (!(k in D)) D[k] = JSON.parse(JSON.stringify(DEFAULTS[k]));
            });
            D.meta.password = storedPwd || DEFAULTS.meta.password;
        }

        // ── saveData: Firebase + localStorage (fallback) ──────────────────────────
        async function saveData() {
            // senha sempre em localStorage separado
            localStorage.setItem(SK_PWD, D.meta.password);

            // processa dados ANTES de qualquer persistência
            const cleanData = _stripHeavyData(D);

            // tenta salvar no Firebase
            if (window._fbReady) {
                try {
                    await window._fb.saveData(cleanData); // passa já limpo
                    // cache offline no localStorage
                    _saveLocalFallback(cleanData);
                    return;
                } catch(e) {
                    console.warn('Firebase saveData falhou, salvando localmente:', e);
                }
            }
            _saveLocalFallback(cleanData);
        }

        function _stripHeavyData(D) {
            // Remove TODOS os base64 antes de salvar — Firestore tem limite de 1MB por documento
            const toSave = JSON.parse(JSON.stringify(D));
            delete toSave.meta.password;

            // foto de perfil: remove base64, mantém URL do Storage
            if (toSave.identity) {
                const ph = toSave.identity.photo || '';
                if (ph.startsWith('data:')) {
                    // sem URL do Storage ainda — remove para não estourar Firestore
                    delete toSave.identity.photo;
                }
                // base64 do vídeo de identidade (não existe, mas por precaução)
            }

            if (toSave.portfolio && toSave.portfolio.posts) {
                toSave.portfolio.posts = toSave.portfolio.posts.map(p => {
                    const c = Object.assign({}, p);
                    // vídeo base64 NUNCA persiste — sempre usa videoURL do Storage
                    delete c.video;
                    // imagem base64: remove sempre — usa image URL do Storage
                    const img = c.image || '';
                    if (img.startsWith('data:')) delete c.image;
                    // thumb base64 do reel: comprimida mas ainda pode ser grande
                    const th = c.thumb || '';
                    if (th.startsWith('data:') && th.length > 50000) delete c.thumb;
                    return c;
                });
            }
            return toSave;
        }

        function _saveLocalFallback(cleanData) {
            try {
                // usa dados já processados se disponíveis, senão processa agora
                const toSave = cleanData || _stripHeavyData(D);
                localStorage.setItem(SK, JSON.stringify(toSave));
            } catch(e) {
                if (e.name === 'QuotaExceededError') console.warn('localStorage cheio');
            }
        }

            const keys = path.split('.');

                if (!(keys[i] in obj)) obj[keys[i]] = {};
                obj = obj[keys[i]];
            }
            obj[keys[keys.length - 1]] = val;
        }

        async function hashPwd(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
        }

        }

        function inp(path, placeholder = '') {

            return `<input type="text" value="${val}" placeholder="${esc(placeholder)}" onchange="sp('${path}', this.value)" />`;
        }

            const val = esc(gp(path) || '');
            return `<textarea rows="${rows}" onchange="sp('${path}', this.value)">${val}</textarea>`;
        }

            const checked = gp(path);
            return `<div class="adm-toggle"><label>${label}</label><div class="toggle-switch ${checked ? 'active' : ''}" onclick="toggleSetting(this, '${path}')"><div class="toggle-knob"></div></div></div>`;
        }

            el.classList.toggle('active');

            D[section][k].push(defaultItem);

<button class="adm-btn adm-btn-secondary" style="width:100%;margin-bottom:0.8rem;" onclick="D.colors={bg0:'#070707',bg1:'#101010',bgc:'#161616',gold:'#C9A84C',gold_l:'#E2C97E',gold_d:'#9A7A2A',rose:'#B76E79',rose_l:'#D49098',t1:'#F0EAD6',t2:'#95897a'}; applyColors(); showTab('cores'); notify('Cores resetadas', 'success');">↺ Resetar Cores Padrão</button>`;
            },
            config: () => {
                return `<h3 style="color: var(--gold); font-size: 0.9rem; margin-bottom: 1rem;">Configurações</h3>${field('Título da Página', inp('meta.title'))}${field('Nova Senha', `<input type="password" placeholder="Deixar em branco para não alterar" onchange="if(this.value) updatePassword(this.value)" />`)}<hr style="border:none; border-top:1px solid var(--border); margin: 1.5rem 0;" /><button class="adm-btn adm-btn-secondary" style="width: 100%; margin-bottom: 0.8rem;" onclick="if(confirm('Resetar TODOS os dados?')) { D = JSON.parse(JSON.stringify(DEFAULTS)); localStorage.removeItem(SK_PWD); localStorage.removeItem(SK); applyColors(); saveData().then(() => { renderAll(); closeAdmin(); notify('Resetado', 'success'); }); }">Resetar Tudo</button><button class="adm-btn adm-btn-secondary" style="width: 100%; margin-bottom: 0.8rem;" onclick="if(confirm('Deletar TODOS os dados?')) { localStorage.removeItem(SK); localStorage.removeItem(SK_PWD); location.reload(); }">Limpar Dados</button>`;
            }
        };

        function applyColors() {
            const c = D.colors || {};
            const root = document.documentElement;
            if (c.bg0)    root.style.setProperty('--bg0', c.bg0);
            if (c.bg1)    root.style.setProperty('--bg1', c.bg1);
            if (c.bgc)    root.style.setProperty('--bgc', c.bgc);
            if (c.gold)   root.style.setProperty('--gold', c.gold);
            if (c.gold_l) root.style.setProperty('--gold-l', c.gold_l);
            if (c.gold_d) root.style.setProperty('--gold-d', c.gold_d);
            if (c.rose)   root.style.setProperty('--rose', c.rose);
            if (c.rose_l) root.style.setProperty('--rose-l', c.rose_l);
            if (c.t1)     root.style.setProperty('--t1', c.t1);
            if (c.t2)     root.style.setProperty('--t2', c.t2);
            const g = c.gold || '#C9A84C';
            const gl = c.gold_l || '#E2C97E';
            const gd = c.gold_d || '#9A7A2A';
            root.style.setProperty('--border', `rgba(${hexToRgb(g)}, 0.18)`);
            root.style.setProperty('--border-gold', `rgba(${hexToRgb(g)}, 0.2)`);
            root.style.setProperty('--grad', `linear-gradient(135deg, ${g}, ${gl}, ${gd})`);
        }

        function hexToRgb(hex) {
            const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return r ? `${parseInt(r[1],16)}, ${parseInt(r[2],16)}, ${parseInt(r[3],16)}` : '201, 168, 76';
        }

        async function saveAndApply() {
            try {
                await saveData();
                applyColors();
                renderAll();
                notify('Salvo com sucesso!', 'success');
            } catch(e) {
                if (e.name === 'QuotaExceededError' || e.code === 22) {
                    notify('Armazenamento local cheio. Dados salvos no Firebase.', 'error');
                } else {
                    notify('Erro ao salvar: ' + e.message, 'error');
                    console.error('saveAndApply error:', e);
                }
            }
        }

        /**
         * Comprime imagem para JPEG máx maxPx, qualidade quality.
         * Retorna { dataUrl, blob } — blob para upload no Storage, dataUrl para preview local.
         */
        function compressImage(file, maxPx = 1200, quality = 0.78) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        if (width > maxPx || height > maxPx) {
                            if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
                            else { width = Math.round(width * maxPx / height); height = maxPx; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', quality);
                        canvas.toBlob(blob => resolve({ dataUrl, blob }), 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                    img.src = evt.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function handlePhotoUpload(e) {
            if (!e.target.files[0]) return;
            notify('Carregando foto...', 'success');
            const { dataUrl, blob } = await compressImage(e.target.files[0], 800, 0.82);
            sp('identity.photo', dataUrl); // preview imediato
            showTab('identidade');
            if (window._fbReady && window._fb) {
                try {
                    // remove foto antiga do Storage se existir
                    const oldPath = D.identity.photoPath;
                    if (oldPath) await window._fb.deleteImage(oldPath);
                    const { url, path } = await window._fb.uploadImage(blob, 'photos', 'profile');
                    sp('identity.photo', url);
                    sp('identity.photoPath', path);
                    await saveData();
                    showTab('identidade');
                    notify('Foto salva!', 'success');
                } catch(err) {
                    console.error('Upload foto falhou:', err);
                    await saveData();
                    notify('Foto salva localmente (Firebase indisponível)', 'error');
                }
            } else {
                await saveData();
            }
        }

        async function handlePortfolioImage(e, index) {
            if (!e.target.files[0]) return;
            notify('Carregando imagem...', 'success');
            const { dataUrl, blob } = await compressImage(e.target.files[0], 1200, 0.78);
            sp('portfolio.posts.' + index + '.image', dataUrl); // preview imediato
            showTab('portfolio');
            if (window._fbReady && window._fb) {
                try {
                    const oldPath = D.portfolio.posts[index] && D.portfolio.posts[index].imagePath;
                    if (oldPath) await window._fb.deleteImage(oldPath);
                    const { url, path } = await window._fb.uploadImage(blob, 'portfolio', 'post_' + index);
                    sp('portfolio.posts.' + index + '.image', url);
                    sp('portfolio.posts.' + index + '.imagePath', path);
                    await saveData();
                    showTab('portfolio');
                    notify('Imagem salva!', 'success');
                } catch(err) {
                    console.error('Upload imagem falhou:', err);
                    await saveData();
                    notify('Erro no upload — imagem pode não aparecer no celular', 'error');
                }
            } else {
                await saveData();
            }
        }

        async function handlePortfolioVideo(e, index) {
            if (!e.target.files[0]) return;
            const file = e.target.files[0];
            if (file.size > 300 * 1024 * 1024) {
                notify('Vídeo muito grande (máx 300MB)', 'error');
                return;
            }
            notify('Fazendo upload do vídeo...', 'success');

            // 1. Lê o arquivo para gerar thumb e reprodução local imediata
            const reader = new FileReader();
            reader.onload = async (evt) => {
                const b64 = evt.target.result;
                sp('portfolio.posts.' + index + '.video', b64); // memória — exibição imediata

                // Gera thumbnail do primeiro frame
                const vid = document.createElement('video');
                vid.src = b64;
                vid.currentTime = 0.5;
                vid.addEventListener('seeked', async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    const vw = vid.videoWidth, vh = vid.videoHeight;
                    const size = Math.min(vw, vh);
                    ctx.drawImage(vid, (vw-size)/2, (vh-size)/2, size, size, 0, 0, 400, 400);
                    const thumb = canvas.toDataURL('image/jpeg', 0.6);
                    sp('portfolio.posts.' + index + '.thumb', thumb);
                    showTab('portfolio');

                    // 2. Upload para Firebase Storage (URL permanente)
                    if (window._fbReady) {
                        try {
                            // remove vídeo antigo do Storage se existir
                            const oldPath = D.portfolio.posts[index].videoPath;
                            if (oldPath) await window._fb.deleteVideo(oldPath);

                            const { url, path } = await window._fb.uploadVideo(file, index);
                            sp('portfolio.posts.' + index + '.videoURL', url);
                            sp('portfolio.posts.' + index + '.videoPath', path);
                            sp('portfolio.posts.' + index + '.video', url); // aponta para URL permanente
                            await saveData();
                            showTab('portfolio');
                            notify('Reel salvo permanentemente!', 'success');
                        } catch(err) {
                            console.error('Upload Firebase falhou:', err);
                            await saveData();
                            notify('Upload falhou — vídeo salvo localmente (some ao recarregar)', 'error');
                        }
                    } else {
                        await saveData();
                        notify('Firebase indisponível — vídeo em memória temporária', 'error');
                    }
                }, { once: true });
            };
            reader.readAsDataURL(file);
        }

        async function removePortfolioVideo(index) {
            const post = D.portfolio.posts[index];
            if (post.videoPath && window._fbReady) {
                try { await window._fb.deleteVideo(post.videoPath); } catch(e) {}
            }
            sp('portfolio.posts.' + index + '.video', null);
            sp('portfolio.posts.' + index + '.videoURL', null);
            sp('portfolio.posts.' + index + '.videoPath', null);
            sp('portfolio.posts.' + index + '.thumb', null);
            await saveData();
            showTab('portfolio');
        }

        async function exportJSON() {
            const toExport = JSON.parse(JSON.stringify(D));
            delete toExport.meta.password; // nunca exporta senha
            // remove vídeos base64 (pesados demais para JSON)
            if (toExport.portfolio && toExport.portfolio.posts) {
                toExport.portfolio.posts = toExport.portfolio.posts.map(p => {
                    if (p.type === 'reel') { const c = Object.assign({}, p); delete c.video; return c; }
                    return p;
                });
            }
            const json = JSON.stringify(toExport, null, 2);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
            a.download = 'portfolio-data.json';
            a.click();
            notify('Exportado!', 'success');
        }

        function importJSON() {
            document.getElementById('adm-import-file').click();
        }

        function handleImportFile(e) {
            const reader = new FileReader();
            reader.onload = async (evt) => {
                try {
                    const imported = JSON.parse(evt.target.result);
                    const currentPwd = D.meta.password;
                    Object.assign(D, imported);
                    D.meta.password = currentPwd;
                    applyColors();
                    await saveData();
                    renderAll();
                    notify('Importado!', 'success');
                } catch (err) {
                    notify('Erro ao importar', 'error');
                }
            };
            reader.readAsText(e.target.files[0]);
            e.target.value = '';
        }

        function notify(msg, type = 'success') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => {
                notif.style.animation = 'slideUp 0.3s ease reverse';
                setTimeout(() => notif.remove(), 300);
            }, 3000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const init = async () => {
                await loadData();
                applyColors();
                renderAll();
                document.getElementById('adm-fab').addEventListener('click', () => {
                    openAdminLogin();
                });
                document.getElementById('adm-pwd').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkPwd();
                });
            };

            // Se Firebase já carregou (module scripts são rápidos), inicia direto.
            // Caso contrário aguarda o evento, com timeout de 4s para fallback.
            if (window._fbReady) {
                init();
            } else {
                let done = false;
                const timeout = setTimeout(() => {
                    if (!done) { done = true; console.warn('Firebase timeout — usando localStorage'); init(); }
                }, 4000);
                window.addEventListener('firebase-ready', () => {
                    if (!done) { done = true; clearTimeout(timeout); init(); }
                });
            }
        });
    </script>
